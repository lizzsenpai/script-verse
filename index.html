<!DOCTYPE html>
<html lang="id">
<head>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0f1a;

            background: rgba(18, 26, 45, 0.7);
            backdrop-filter: blur(14px);

            border-radius: 48px;
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 2.8rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .logo i {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {

        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 24px rgba(239, 68, 68, 0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
        }

        .btn-success:hover {
            transform: scale(1.03);
        }

        .btn-secondary {
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .btn-secondary:hover {
            background: #334155;
            color: #e8edf5;
        }

        .btn-outline {

        .subtitle {
            font-size: 1rem;

        /* ===== SEARCH & FILTER ===== */
        .search-section {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 2rem;
            align-items: center;
            justify-content: center;
        }

        .search-wrapper {
            flex: 2;
            min-width: 240px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            border-radius: 40px;
            border: none;
            background: #1e293b;
            color: #f1f5f9;

            outline: 2px solid transparent;
            transition: 0.25s ease;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
        }

        .search-wrapper input::placeholder {
            color: #64748b;
            font-weight: 300;
        }

        .search-wrapper input:focus {
            outline: 2px solid #818cf8;
            background: #0f172a;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            background: #1e293b;
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;

        }

        .filter-btn i {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .filter-btn.active i {
            color: #fff;
        }

        .filter-btn:hover:not(.active) {
            background: #334155;
            transform: scale(1.02);
        }

        /* ===== GRID ===== */
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin: 1.5rem 0;
        }

        .script-card {
            background: #111b2e;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
        }

        .script-card:hover {
            transform: translateY(-6px);
            border-color: rgba(129, 140, 248, 0.2);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.2);
            background: #14213a;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .script-card:nth-child(1) { animation-delay: 0.04s; }
        .script-card:nth-child(2) { animation-delay: 0.08s; }
        .script-card:nth-child(3) { animation-delay: 0.12s; }
        .script-card:nth-child(4) { animation-delay: 0.16s; }
        .script-card:nth-child(5) { animation-delay: 0.20s; }
        .script-card:nth-child(6) { animation-delay: 0.24s; }

        .card-thumbnail {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #0a0f1a;
            overflow: hidden;
        }

        .card-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;

        .script-card:hover .card-thumbnail img {
            transform: scale(1.05);
        }

        .card-thumbnail .badge-category {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.65);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-thumbnail .badge-status {
            position: absolute;
            bottom: 12px;
            left: 12px;
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-body {
            padding: 1.3rem 1.3rem 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.1rem;

            font-weight: 500;

        }

        .empty-state i {

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 14px 22px;
            color: #e8edf5;
            font-size: 0.9rem;

            transform: translateY(120px);

            z-index: 999;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast i {
            font-size: 1.3rem;
        }
        .toast.success i {
            color: #4ade80;
        }
        .toast.error i {

        /* ===== RESPONSIVE ===== */

            .container {

        /* Badge status colors */
        .badge-status {

            border-color: rgba(34, 197, 94, 0.2);
        }
        .badge-status.beta {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.2);
        }
        .badge-status.deprecated {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.2);
        }

        /* ===== LOADING ===== */
        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: #64748b;
        }
        .loading-state i {
            font-size: 2.5rem;
            color: #818cf8;
            animation: spin 1s linear infinite;
            display: block;
            margin-bottom: 12px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }

<body>

        </div>

        <!-- ===== SEARCH & FILTER ===== -->
        <div class="search-section">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari script, misal: bot wa, backup..." />
            </div>
            <div class="filter-group" id="filterGroup">
                <button class="filter-btn active" data-filter="all"><i class="fas fa-th-list"></i> Semua</button>
                <button class="filter-btn" data-filter="whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</button>

            </div>

        <!-- ===== SCRIPT GRID ===== -->
        <div class="script-grid" id="scriptGrid">
            <div class="loading-state">
                <i class="fas fa-spinner"></i>
                <p>Memuat data script...</p>
            </div>
        </div>

        <!-- ===== FOOTER ===== -->
        <div class="footer-status">
            <div class="total">
                <i class="fas fa-cubes"></i>
                <span id="totalScripts">0</span> script tersedia
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="reset-btn" id="resetBtn"><i class="fas fa-undo-alt"></i> Reset filter</button>
                <button class="reset-btn" id="refreshBtn" style="border-color: #818cf8; color: #818cf8;">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        //  KONFIGURASI
        // ============================================================
        const STORAGE_KEY = 'scriptverse_data';
        const JSON_URL = 'script.json';

        // ============================================================
        //  STATE
        // ============================================================
        let scripts = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let isLoading = false;

        // ============================================================
        //  ELEMEN
        // ============================================================
        const grid = document.getElementById('scriptGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const resetBtn = document.getElementById('resetBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const totalSpan = document.getElementById('totalScripts');
        const dataSourceSpan = document.getElementById('dataSource');

        // Toast
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // ============================================================
        //  TOAST
        // ============================================================
        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        //  LOAD DATA DARI JSON
        // ============================================================
        async function loadDataFromJSON() {
            try {
                isLoading = true;
                grid.innerHTML = `
                    <div class="loading-state">
                        <i class="fas fa-spinner"></i>
                        <p>Memuat data dari server...</p>
                    </div>
                `;

                const response = await fetch(JSON_URL + '?t=' + Date.now());
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                
                if (data && data.scripts && Array.isArray(data.scripts)) {
                    scripts = data.scripts;
                    // Simpan ke localStorage sebagai backup
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(scripts));
                    dataSourceSpan.textContent = 'JSON Server';
                    dataSourceSpan.style.color = '#4ade80';
                    showToast('✅ Data berhasil dimuat dari server!', 'success');
                } else {
                    throw new Error('Format data tidak valid');
                }
            } catch (error) {
                console.warn('Gagal memuat dari JSON, menggunakan LocalStorage:', error);
                // Fallback ke LocalStorage
                loadFromLocalStorage();
                dataSourceSpan.textContent = 'LocalStorage (Backup)';
                dataSourceSpan.style.color = '#fbbf24';
                showToast('⚠️ Menggunakan data lokal (server tidak tersedia)', 'error');
            } finally {
                isLoading = false;
                renderGrid();
            }
        }

        // ============================================================
        //  LOAD DARI LOCALSTORAGE
        // ============================================================
        function loadFromLocalStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    scripts = JSON.parse(stored);
                } catch (e) {
                    scripts = getDefaultScripts();
                }
            } else {
                scripts = getDefaultScripts();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(scripts));
            }
        }

        // ============================================================
        //  DEFAULT DATA
        // ============================================================
        function getDefaultScripts() {
            return [
                {
                    id: 1,
                    title: 'Bot WhatsApp Pro',
                    version: 'v3.2.1',
                    desc: 'Bot WhatsApp multi-fitur dengan auto reply, downloader, dan manajemen grup.',
                    category: 'whatsapp',
                    status: 'Active',
                    downloads: 1523,
                    size: '4.2 MB',

                    downloadUrl: 'https://github.com/example/bot-wa-pro/archive/main.zip',

                },
                {
                    id: 2,

                    version: 'v2.0.5',
                    desc: 'Bot WhatsApp menggunakan library whatsapp-web.js. Fitur: sticker maker, pengingat.',
                    category: 'whatsapp',
                    status: 'Beta',
                    downloads: 876,
                    size: '3.8 MB',
                    image: 'https://picsum.photos/seed/bot2/800/450',
                    downloadUrl: 'https://github.com/example/bot-wa-md/archive/main.zip',
                    shareUrl: 'https://example.com/script/bot-wa-md'
                },
                {
                    id: 3,
                    title: 'Auto Backup Cloud',
                    version: 'v1.5.0',
                    desc: 'Backup otomatis folder ke Google Drive & Dropbox dengan Python.',
                    category: 'python',
                    status: 'Active',
                    downloads: 642,
                    size: '12 KB',
                    image: 'https://picsum.photos/seed/backup/800/450',
                    downloadUrl: 'https://github.com/example/auto-backup/archive/main.zip',
                    shareUrl: 'https://example.com/script/auto-backup'
                },
                {
                    id: 4,
                    title: 'Clean Temp System',
                    version: 'v2.1.0',
                    desc: 'Bersihkan file temporary, cache, dan log di Windows/Linux.',
                    category: 'bash',
                    status: 'Active',
                    downloads: 417,
                    size: '4 KB',
                    image: 'https://picsum.photos/seed/cleaner/800/450',
                    downloadUrl: 'https://github.com/example/clean-temp/archive/main.zip',
                    shareUrl: 'https://example.com/script/clean-temp'
                }
            ];
        }

        // ============================================================
        //  SHARE
        // ============================================================
        function shareScript(script) {
            const data = {
                title: script.title,
                text: `📦 ${script.title} ${script.version}\n${script.desc}`,
                url: script.shareUrl || script.downloadUrl
            };

            if (navigator.share) {
                navigator.share(data).catch(() => {});
            } else {
                navigator.clipboard.writeText(data.url).then(() => {
                    showToast(`✅ Link "${script.title}" disalin!`);
                }).catch(() => {
                    prompt('Copy link ini:', data.url);
                });
            }
        }

        // ============================================================
        //  RENDER GRID
        // ============================================================
        function renderGrid() {
            if (isLoading) return;

            const filtered = scripts.filter(item => {
                const matchCategory = currentFilter === 'all' || item.category === currentFilter;
                const matchSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.desc.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCategory && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>Tidak ada script yang cocok.</p>
                    </div>
                `;
                totalSpan.textContent = '0';
                return;
            }

            grid.innerHTML = filtered.map((script, index) => {
                const categoryIcon = {
                    whatsapp: 'fa-whatsapp',
                    python: 'fa-python',
                    bash: 'fa-terminal',
                    js: 'fa-js',
                    other: 'fa-code'
                } [script.category] || 'fa-code';

                const statusClass = script.status.toLowerCase();

                return `
                    <div class="script-card" style="animation-delay: ${(index * 0.04)}s">
                        <div class="card-thumbnail">
                            <img src="${script.image || 'https://picsum.photos/seed/script' + script.id + '/800/450'}" 
                                 alt="${script.title}" 
                                 loading="lazy"
                                 onerror="this.src='https://picsum.photos/seed/error' + ${script.id} + '/800/450'" />
                            <span class="badge-category">
                                <i class="fab ${categoryIcon}"></i>
                                ${script.category.charAt(0).toUpperCase() + script.category.slice(1)}
                            </span>
                            <span class="badge-status ${statusClass}">
                                <i class="fas fa-circle" style="font-size: 0.35rem;"></i>
                                ${script.status}
                            </span>
                        </div>
                        <div class="card-body">
                            <div class="card-title">${script.title}</div>
                            <div class="card-version"><i class="fas fa-tag"></i> ${script.version}</div>
                            <div class="card-desc">${script.desc}</div>
                            <div class="card-stats">
                                <span class="stat-item">
                                    <i class="fas fa-download"></i> <strong>${(script.downloads || 0).toLocaleString()}</strong>
                                </span>
                                <span class="stat-item">
                                    <i class="fas fa-file-archive"></i> <strong>${script.size || '1 MB'}</strong>
                                </span>
                            </div>
                            <div class="card-actions">
                                <a href="${script.downloadUrl}" target="_blank" class="download-btn" download>
                                    <i class="fas fa-download"></i> Unduh Script
                                </a>
                                <button class="share-btn" onclick="shareScript(${JSON.stringify(script).replace(/"/g, '&quot;')})">
                                    <i class="fas fa-share-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            totalSpan.textContent = filtered.length;
        }

        // ============================================================
        //  EVENT: FILTER
        // ============================================================
        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                filterBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderGrid();
            });
        });

        // ============================================================
        //  EVENT: SEARCH
        // ============================================================
        let searchTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = this.value.trim();
                renderGrid();
            }, 150);
        });

        // ============================================================
        //  EVENT: RESET
        // ============================================================
        resetBtn.addEventListener('click', function() {
            searchInput.value = '';
            searchQuery = '';
            currentFilter = 'all';
            filterBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-filter="all"]').classList.add('active');
            renderGrid();
            showToast('🔄 Filter direset!');
        });

        // ============================================================
        //  EVENT: REFRESH
        // ============================================================
        refreshBtn.addEventListener('click', function() {
            loadDataFromJSON();
        });

        // ============================================================
        //  INIT
        // ============================================================
        // Coba load dari JSON terlebih dahulu
        loadDataFromJSON();

        // Auto refresh setiap 30 detik
        setInterval(() => {
            loadDataFromJSON();
        }, 30000);

        console.log('✅ ScriptVerse siap!');
        console.log('📦 Data disinkronkan dengan script.json');
    </script>

</body>
</html>
