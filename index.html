<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScriptVerse - Download Script</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ===== RESET & GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0f1a;
            color: #e8edf5;
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: radial-gradient(circle at 20% 30%, #19233b 0%, #0b0f1a 90%);
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: rgba(18, 26, 45, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 2.8rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo i {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 24px rgba(239, 68, 68, 0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
        }

        .btn-success:hover {
            transform: scale(1.03);
        }

        .btn-secondary {
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .btn-secondary:hover {
            background: #334155;
            color: #e8edf5;
        }

        .btn-outline {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .btn-outline:hover {
            background: #1e293b;
            color: #e8edf5;
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            letter-spacing: 0.3px;
            font-weight: 300;
        }

        /* ===== LOGIN ===== */
        .login-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .login-overlay.show {
            display: flex;
        }

        .login-modal {
            background: #111b2e;
            border-radius: 32px;
            padding: 2.5rem 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .login-modal .lock-icon {
            font-size: 3.5rem;
            color: #818cf8;
            margin-bottom: 1rem;
        }

        .login-modal h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .login-modal p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .login-modal input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #1e293b;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 1rem;
            outline: 2px solid transparent;
            transition: 0.25s;
            margin-bottom: 14px;
        }

        .login-modal input:focus {
            outline: 2px solid #818cf8;
        }

        .login-modal .btn {
            width: 100%;
            justify-content: center;
            padding: 14px;
            font-size: 1rem;
        }

        .login-error {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        /* ===== ADMIN PANEL ===== */
        .admin-panel {
            display: none;
            margin-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 2rem;
        }

        .admin-panel.show {
            display: block;
            animation: fadeUp 0.4s ease;
        }

        .admin-panel h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-panel h3 i {
            color: #818cf8;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .form-group label i {
            margin-right: 6px;
            color: #818cf8;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #1e293b;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: 2px solid #818cf8;
            border-color: transparent;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        /* ===== TABLE ===== */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        thead {
            background: rgba(255, 255, 255, 0.02);
        }

        th {
            padding: 12px 14px;
            text-align: left;
            color: #94a3b8;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            vertical-align: middle;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .table-thumb {
            width: 50px;
            height: 28px;
            object-fit: cover;
            border-radius: 6px;
        }

        .table-actions {
            display: flex;
            gap: 6px;
        }

        .table-actions .btn {
            padding: 4px 12px;
            font-size: 0.7rem;
        }

        .badge-status-small {
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .badge-status-small.active {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }
        .badge-status-small.beta {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }
        .badge-status-small.deprecated {
            background: rgba(248, 113, 113, 0.15);
            color: #f87171;
        }

        /* ===== SEARCH & FILTER ===== */
        .search-section {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 2rem;
            align-items: center;
            justify-content: center;
        }

        .search-wrapper {
            flex: 2;
            min-width: 240px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            border-radius: 40px;
            border: none;
            background: #1e293b;
            color: #f1f5f9;
            font-size: 1rem;
            outline: 2px solid transparent;
            transition: 0.25s ease;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
        }

        .search-wrapper input::placeholder {
            color: #64748b;
            font-weight: 300;
        }

        .search-wrapper input:focus {
            outline: 2px solid #818cf8;
            background: #0f172a;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            background: #1e293b;
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .filter-btn i {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .filter-btn.active i {
            color: #fff;
        }

        .filter-btn:hover:not(.active) {
            background: #334155;
            transform: scale(1.02);
        }

        /* ===== GRID ===== */
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin: 1.5rem 0;
        }

        .script-card {
            background: #111b2e;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
        }

        .script-card:hover {
            transform: translateY(-6px);
            border-color: rgba(129, 140, 248, 0.2);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.2);
            background: #14213a;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .script-card:nth-child(1) { animation-delay: 0.04s; }
        .script-card:nth-child(2) { animation-delay: 0.08s; }
        .script-card:nth-child(3) { animation-delay: 0.12s; }
        .script-card:nth-child(4) { animation-delay: 0.16s; }
        .script-card:nth-child(5) { animation-delay: 0.20s; }
        .script-card:nth-child(6) { animation-delay: 0.24s; }

        .card-thumbnail {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #0a0f1a;
            overflow: hidden;
        }

        .card-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .script-card:hover .card-thumbnail img {
            transform: scale(1.05);
        }

        .card-thumbnail .badge-category {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.65);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-thumbnail .badge-status {
            position: absolute;
            bottom: 12px;
            left: 12px;
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-body {
            padding: 1.3rem 1.3rem 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: -0.3px;
        }

        .card-version {
            font-size: 0.78rem;
            color: #818cf8;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 12px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-stats {
            display: flex;
            gap: 16px;
            padding: 8px 0 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 12px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            color: #94a3b8;
        }

        .stat-item i {
            color: #818cf8;
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .stat-item strong {
            color: #e8edf5;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .download-btn {
            flex: 1;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            padding: 11px 0;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.82rem;
            color: #fff;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.2);
        }

        .download-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(79, 70, 229, 0.4);
        }

        .share-btn {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 11px 16px;
            border-radius: 60px;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-family: inherit;
        }

        .share-btn:hover {
            background: #334155;
            color: #e8edf5;
            border-color: #64748b;
        }

        /* ===== FOOTER ===== */
        .footer-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            color: #64748b;
            font-size: 0.9rem;
        }

        .footer-status .total {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-status .total i {
            color: #818cf8;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-family: inherit;
        }

        .reset-btn:hover {
            background: #1e293b;
            border-color: #64748b;
            color: #f1f5f9;
        }

        /* ===== EMPTY ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: #64748b;
        }

        .empty-state i {
            font-size: 3rem;
            opacity: 0.3;
            margin-bottom: 12px;
            display: block;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 14px 22px;
            color: #e8edf5;
            font-size: 0.9rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transform: translateY(120px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast i {
            font-size: 1.3rem;
        }
        .toast.success i {
            color: #4ade80;
        }
        .toast.error i {
            color: #f87171;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container {
                padding: 1.5rem 1rem;
                border-radius: 32px;
            }
            .header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .logo {
                font-size: 1.6rem;
            }
            .filter-group {
                width: 100%;
                justify-content: center;
            }
            .filter-btn {
                padding: 8px 14px;
                font-size: 0.78rem;
            }
            .script-grid {
                grid-template-columns: 1fr;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-actions {
                flex-direction: column;
            }
            .footer-status {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            .card-actions {
                flex-direction: column;
            }
            .share-btn {
                justify-content: center;
            }
            .table-actions {
                flex-direction: column;
            }
            .login-modal {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Berhasil!</span>
    </div>

    <!-- ===== LOGIN OVERLAY ===== -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-modal">
            <div class="lock-icon"><i class="fas fa-lock"></i></div>
            <h2>Admin Panel</h2>
            <p>Masukkan key untuk mengelola script</p>
            <input type="password" id="adminKeyInput" placeholder="Masukkan key admin..." />
            <button class="btn btn-primary" id="loginBtn"><i class="fas fa-key"></i> Login</button>
            <div class="login-error" id="loginError">❌ Key salah! Coba lagi.</div>
        </div>
    </div>

    <!-- ===== MAIN CONTAINER ===== -->
    <div class="container" id="app">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-terminal"></i> ScriptVerse
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" id="adminToggleBtn">
                    <i class="fas fa-user-shield"></i> Admin
                </button>
            </div>
        </div>

        <!-- ===== SUBTITLE ===== -->
        <div class="subtitle" style="text-align:center; margin-bottom:1.5rem;">
            <i class="fas fa-cloud-download-alt" style="margin-right: 8px; color: #818cf8;"></i>
            Koleksi script bot WhatsApp & lainnya — unduh gratis
        </div>

        <!-- ===== ADMIN PANEL ===== -->
        <div class="admin-panel" id="adminPanel">
            <h3><i class="fas fa-plus-circle"></i> <span id="formTitle">Tambah Script Baru</span></h3>

            <form id="scriptForm" class="form-grid">
                <input type="hidden" id="editId" value="" />

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Judul Script *</label>
                    <input type="text" id="fTitle" placeholder="Contoh: Bot WhatsApp Pro" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-code-branch"></i> Versi *</label>
                    <input type="text" id="fVersion" placeholder="Contoh: v3.2.1" required />
                </div>
                <div class="form-group full">
                    <label><i class="fas fa-align-left"></i> Deskripsi *</label>
                    <textarea id="fDesc" placeholder="Jelaskan fungsi script..." required></textarea>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-folder"></i> Kategori *</label>
                    <select id="fCategory" required>
                        <option value="whatsapp">WhatsApp</option>
                        <option value="python">Python</option>
                        <option value="bash">Bash</option>
                        <option value="js">JavaScript</option>
                        <option value="other">Lainnya</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-circle"></i> Status *</label>
                    <select id="fStatus" required>
                        <option value="Active">Active</option>
                        <option value="Beta">Beta</option>
                        <option value="Deprecated">Deprecated</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-download"></i> Jumlah Download</label>
                    <input type="number" id="fDownloads" placeholder="0" value="0" />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-file-archive"></i> Ukuran File</label>
                    <input type="text" id="fSize" placeholder="Contoh: 4.2 MB" value="1 MB" />
                </div>
                <div class="form-group full">
                    <label><i class="fas fa-image"></i> URL Gambar (thumbnail 16:9) *</label>
                    <input type="url" id="fImage" placeholder="https://picsum.photos/seed/xxx/800/450" required />
                </div>
                <div class="form-group full">
                    <label><i class="fas fa-link"></i> URL Download *</label>
                    <input type="url" id="fDownloadUrl" placeholder="https://github.com/.../archive/main.zip" required />
                </div>
                <div class="form-group full">
                    <label><i class="fas fa-share-alt"></i> URL Share</label>
                    <input type="url" id="fShareUrl" placeholder="https://example.com/script/nama" />
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> <span id="submitBtnText">Simpan Script</span></button>
                    <button type="button" class="btn btn-secondary" id="cancelFormBtn"><i class="fas fa-times"></i> Batal</button>
                </div>
            </form>

            <!-- Tabel Script -->
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Gambar</th>
                            <th>Judul</th>
                            <th>Versi</th>
                            <th>Kategori</th>
                            <th>Status</th>
                            <th>Download</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- render by JS -->
                    </tbody>
                </table>
            </div>
            <p style="color: #64748b; margin-top: 1rem; font-size: 0.8rem;">
                <i class="fas fa-info-circle"></i> Data tersimpan di server, semua orang bisa lihat!
            </p>
        </div>

        <!-- ===== SEARCH & FILTER ===== -->
        <div class="search-section">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari script, misal: bot wa, backup..." />
            </div>
            <div class="filter-group" id="filterGroup">
                <button class="filter-btn active" data-filter="all"><i class="fas fa-th-list"></i> Semua</button>
                <button class="filter-btn" data-filter="whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                <button class="filter-btn" data-filter="python"><i class="fab fa-python"></i> Python</button>
                <button class="filter-btn" data-filter="bash"><i class="fas fa-terminal"></i> Bash</button>
                <button class="filter-btn" data-filter="js"><i class="fab fa-js"></i> JS</button>
                <button class="filter-btn" data-filter="other"><i class="fas fa-code"></i> Lainnya</button>
            </div>
        </div>

        <!-- ===== SCRIPT GRID ===== -->
        <div class="script-grid" id="scriptGrid">
            <!-- render by JS -->
        </div>

        <!-- ===== FOOTER ===== -->
        <div class="footer-status">
            <div class="total">
                <i class="fas fa-cubes"></i>
                <span id="totalScripts">0</span> script tersedia
            </div>
            <button class="reset-btn" id="resetBtn"><i class="fas fa-undo-alt"></i> Reset filter</button>
        </div>

    </div>

    <script>
        // ============================================================
        //  KONFIGURASI API
        // ============================================================
        // GANTI URL INI dengan URL Vercel kamu!
        const API_URL = 'https://scriptverse-api.vercel.app/scripts';

        // ============================================================
        //  CONFIG
        // ============================================================
        const ADMIN_KEY = '7655827848';

        // ============================================================
        //  STATE
        // ============================================================
        let scripts = [];
        let isAdmin = false;
        let editingId = null;
        let currentFilter = 'all';
        let searchQuery = '';
        let loading = false;

        // ============================================================
        //  ELEMENTS
        // ============================================================
        // Login
        const loginOverlay = document.getElementById('loginOverlay');
        const adminKeyInput = document.getElementById('adminKeyInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        // Admin
        const adminPanel = document.getElementById('adminPanel');
        const adminToggleBtn = document.getElementById('adminToggleBtn');
        const scriptForm = document.getElementById('scriptForm');
        const editId = document.getElementById('editId');
        const formTitle = document.getElementById('formTitle');
        const submitBtnText = document.getElementById('submitBtnText');
        const cancelFormBtn = document.getElementById('cancelFormBtn');
        const tableBody = document.getElementById('tableBody');

        const fTitle = document.getElementById('fTitle');
        const fVersion = document.getElementById('fVersion');
        const fDesc = document.getElementById('fDesc');
        const fCategory = document.getElementById('fCategory');
        const fStatus = document.getElementById('fStatus');
        const fDownloads = document.getElementById('fDownloads');
        const fSize = document.getElementById('fSize');
        const fImage = document.getElementById('fImage');
        const fDownloadUrl = document.getElementById('fDownloadUrl');
        const fShareUrl = document.getElementById('fShareUrl');

        // Public
        const grid = document.getElementById('scriptGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const resetBtn = document.getElementById('resetBtn');
        const totalSpan = document.getElementById('totalScripts');

        // Toast
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // ============================================================
        //  TOAST
        // ============================================================
        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        //  API FUNCTIONS (GANTI localStorage PAKAI FETCH)
        // ============================================================

        // Ambil semua data dari server
        async function loadData() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error('Gagal ambil data');
                scripts = await res.json();
                return scripts;
            } catch (error) {
                console.error('Error loading data:', error);
                showToast('❌ Gagal memuat data dari server', 'error');
                scripts = [];
                return [];
            }
        }

        // Tambah script baru
        async function addScript(data) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Gagal tambah script');
                const result = await res.json();
                return result;
            } catch (error) {
                console.error('Error adding script:', error);
                showToast('❌ Gagal menambahkan script', 'error');
                return null;
            }
        }

        // Update script
        async function updateScript(id, data) {
            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Gagal update script');
                const result = await res.json();
                return result;
            } catch (error) {
                console.error('Error updating script:', error);
                showToast('❌ Gagal mengupdate script', 'error');
                return null;
            }
        }

        // Hapus script
        async function deleteScript(id) {
            if (!confirm('Yakin hapus script ini?')) return false;
            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });
                if (!res.ok) throw new Error('Gagal hapus script');
                showToast('🗑️ Script dihapus!');
                return true;
            } catch (error) {
                console.error('Error deleting script:', error);
                showToast('❌ Gagal menghapus script', 'error');
                return false;
            }
        }

        // ============================================================
        //  RENDER TABLE
        // ============================================================
        function renderTable() {
            if (scripts.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align:center; color:#64748b; padding:2rem;">
                            <i class="fas fa-inbox" style="font-size:2rem; display:block; margin-bottom:8px;"></i>
                            Belum ada script.
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = scripts.map(s => `
                <tr>
                    <td><img src="${s.image}" alt="${s.title}" class="table-thumb" /></td>
                    <td><strong>${s.title}</strong></td>
                    <td>${s.version}</td>
                    <td><span class="badge-status-small" style="background:rgba(129,140,248,0.15); color:#818cf8;">${s.category}</span></td>
                    <td><span class="badge-status-small ${s.status.toLowerCase()}">${s.status}</span></td>
                    <td>${(s.downloads || 0).toLocaleString()}</td>
                    <td>
                        <div class="table-actions">
                            <button class="btn btn-primary" onclick="editScript(${s.id})" style="padding:4px 12px; font-size:0.7rem;">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-danger" onclick="handleDelete(${s.id})" style="padding:4px 12px; font-size:0.7rem;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // ============================================================
        //  HANDLE DELETE (pakai async)
        // ============================================================
        async function handleDelete(id) {
            const success = await deleteScript(id);
            if (success) {
                await loadData();
                renderAll();
            }
        }

        // ============================================================
        //  EDIT SCRIPT
        // ============================================================
        function editScript(id) {
            const script = scripts.find(s => s.id === id);
            if (!script) return;

            editingId = id;
            editId.value = id;
            fTitle.value = script.title;
            fVersion.value = script.version;
            fDesc.value = script.desc;
            fCategory.value = script.category;
            fStatus.value = script.status;
            fDownloads.value = script.downloads || 0;
            fSize.value = script.size || '1 MB';
            fImage.value = script.image;
            fDownloadUrl.value = script.downloadUrl;
            fShareUrl.value = script.shareUrl || '';

            formTitle.textContent = 'Edit Script';
            submitBtnText.textContent = 'Update Script';
            adminPanel.scrollIntoView({ behavior: 'smooth' });
        }

        function resetForm() {
            scriptForm.reset();
            editId.value = '';
            editingId = null;
            formTitle.textContent = 'Tambah Script Baru';
            submitBtnText.textContent = 'Simpan Script';
            fDownloads.value = '0';
            fSize.value = '1 MB';
        }

        // ============================================================
        //  FORM SUBMIT (pakai async)
        // ============================================================
        scriptForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const data = {
                title: fTitle.value.trim(),
                version: fVersion.value.trim(),
                desc: fDesc.value.trim(),
                category: fCategory.value,
                status: fStatus.value,
                downloads: parseInt(fDownloads.value) || 0,
                size: fSize.value.trim() || '1 MB',
                image: fImage.value.trim(),
                downloadUrl: fDownloadUrl.value.trim(),
                shareUrl: fShareUrl.value.trim() || fDownloadUrl.value.trim()
            };

            if (!data.title || !data.version || !data.desc || !data.image || !data.downloadUrl) {
                showToast('⚠️ Semua field wajib diisi!', 'error');
                return;
            }

            let result;
            if (editingId) {
                result = await updateScript(editingId, data);
            } else {
                result = await addScript(data);
            }

            if (result) {
                await loadData();
                renderAll();
                resetForm();
                showToast(editingId ? '✅ Script berhasil diupdate!' : '✅ Script berhasil ditambahkan!');
            }
        });

        cancelFormBtn.addEventListener('click', resetForm);

        // ============================================================
        //  RENDER PUBLIC GRID
        // ============================================================
        function renderGrid() {
            const filtered = scripts.filter(item => {
                const matchCategory = currentFilter === 'all' || item.category === currentFilter;
                const matchSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.desc.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCategory && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>Tidak ada script yang cocok.</p>
                    </div>
                `;
                totalSpan.textContent = '0';
                return;
            }

            grid.innerHTML = filtered.map((script, index) => {
                const categoryIcon = {
                    whatsapp: 'fa-whatsapp',
                    python: 'fa-python',
                    bash: 'fa-terminal',
                    js: 'fa-js',
                    other: 'fa-code'
                } [script.category] || 'fa-code';

                const statusClass = script.status.toLowerCase();

                return `
                    <div class="script-card" style="animation-delay: ${(index * 0.04)}s">
                        <div class="card-thumbnail">
                            <img src="${script.image || 'https://picsum.photos/seed/script' + script.id + '/800/450'}" 
                                 alt="${script.title}" 
                                 loading="lazy" />
                            <span class="badge-category">
                                <i class="fab ${categoryIcon}"></i>
                                ${script.category.charAt(0).toUpperCase() + script.category.slice(1)}
                            </span>
                            <span class="badge-status status-${statusClass}">
                                <i class="fas fa-circle" style="font-size: 0.35rem;"></i>
                                ${script.status}
                            </span>
                        </div>
                        <div class="card-body">
                            <div class="card-title">${script.title}</div>
                            <div class="card-version"><i class="fas fa-tag"></i> ${script.version}</div>
                            <div class="card-desc">${script.desc}</div>
                            <div class="card-stats">
                                <span class="stat-item">
                                    <i class="fas fa-download"></i> <strong>${(script.downloads || 0).toLocaleString()}</strong>
                                </span>
                                <span class="stat-item">
                                    <i class="fas fa-file-archive"></i> <strong>${script.size || '1 MB'}</strong>
                                </span>
                            </div>
                            <div class="card-actions">
                                <a href="${script.downloadUrl}" target="_blank" class="download-btn" download>
                                    <i class="fas fa-download"></i> Unduh Script
                                </a>
                                <button class="share-btn" onclick="shareScript(${JSON.stringify(script).replace(/"/g, '&quot;')})">
                                    <i class="fas fa-share-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            totalSpan.textContent = filtered.length;
        }

        // ============================================================
        //  SHARE
        // ============================================================
        function shareScript(script) {
            const data = {
                title: script.title,
                text: `📦 ${script.title} ${script.version}\n${script.desc}`,
                url: script.shareUrl || script.downloadUrl
            };

            if (navigator.share) {
                navigator.share(data).catch(() => {});
            } else {
                navigator.clipboard.writeText(data.url).then(() => {
                    showToast(`✅ Link "${script.title}" disalin!`);
                }).catch(() => {
                    prompt('Copy link ini:', data.url);
                });
            }
        }

        // ============================================================
        //  RENDER ALL
        // ============================================================
        function renderAll() {
            if (isAdmin) {
                renderTable();
            }
            renderGrid();
        }

        // ============================================================
        //  LOGIN
        // ============================================================
        function login() {
            const key = adminKeyInput.value.trim();
            if (key === ADMIN_KEY) {
                isAdmin = true;
                loginOverlay.classList.remove('show');
                adminPanel.classList.add('show');
                adminToggleBtn.textContent = '🔄 Tutup Admin';
                adminToggleBtn.className = 'btn btn-danger';
                renderTable();
                showToast('✅ Selamat datang, Admin!');
                adminKeyInput.value = '';
                loginError.style.display = 'none';
                document.querySelector('.subtitle').textContent = '🔐 Mode Admin aktif — kamu bisa kelola script';
            } else {
                loginError.style.display = 'block';
                adminKeyInput.value = '';
                adminKeyInput.focus();
                showToast('❌ Key salah!', 'error');
            }
        }

        function logout() {
            isAdmin = false;
            adminPanel.classList.remove('show');
            adminToggleBtn.textContent = '🔑 Admin';
            adminToggleBtn.className = 'btn btn-outline';
            document.querySelector('.subtitle').innerHTML =
                '<i class="fas fa-cloud-download-alt" style="margin-right: 8px; color: #818cf8;"></i>Koleksi script bot WhatsApp & lainnya — unduh gratis';
            showToast('👋 Logout berhasil!');
        }

        // ============================================================
        //  EVENT: LOGIN
        // ============================================================
        loginBtn.addEventListener('click', login);
        adminKeyInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        // ============================================================
        //  EVENT: TOGGLE ADMIN
        // ============================================================
        adminToggleBtn.addEventListener('click', function() {
            if (isAdmin) {
                logout();
            } else {
                loginOverlay.classList.add('show');
                adminKeyInput.focus();
            }
        });

        // ============================================================
        //  EVENT: FILTER
        // ============================================================
        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                filterBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderGrid();
            });
        });

        // ============================================================
        //  EVENT: SEARCH
        // ============================================================
        let searchTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = this.value.trim();
                renderGrid();
            }, 150);
        });

        // ============================================================
        //  EVENT: RESET
        // ============================================================
        resetBtn.addEventListener('click', function() {
            searchInput.value = '';
            searchQuery = '';
            currentFilter = 'all';
            filterBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-filter="all"]').classList.add('active');
            renderGrid();
            showToast('🔄 Filter direset!');
        });

        // ============================================================
        //  INIT
        // ============================================================
        async function init() {
            await loadData();
            renderAll();
            console.log('✅ ScriptVerse siap!');
            console.log('🔑 Key admin: 7655827848');
            console.log('📦 Data disimpan di server via JSON API');
        }

        init();

        // Auto refresh tiap 10 detik
        setInterval(async () => {
            await loadData();
            renderAll();
        }, 10000);
    </script>

</body>
</html>
